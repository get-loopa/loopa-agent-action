name: CodeQL
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '17 4 * * 1'
permissions:
  contents: read
  security-events: write
jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: github/codeql-action/init@ddf5ce7296213f5548c91e2dd19df2d77d2b2d66
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@ddf5ce7296213f5548c91e2dd19df2d77d2b2d66
