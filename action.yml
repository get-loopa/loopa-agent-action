name: Loopa repository analysis
description: Analyze repository changes with your LLM provider and send reviewable proposals to Loopa.
author: Loopa
branding:
  icon: book-open
  color: purple
inputs:
  connection-id:
    description: Non-secret connection identifier generated by Loopa.
    required: true
  provider:
    description: openai, anthropic, google, azure-openai, openrouter, fireworks, or openai-compatible.
    required: true
  model:
    description: Provider model or Azure deployment identifier.
    required: true
  llm-api-key:
    description: API key supplied from GitHub Actions Secrets.
    required: true
  config-path:
    description: Path to the Loopa analysis configuration.
    required: false
    default: .github/loopa.yml
  base-url:
    description: Base URL for an OpenAI-compatible provider.
    required: false
  azure-endpoint:
    description: Azure OpenAI endpoint, for example https://resource.openai.azure.com.
    required: false
  azure-api-version:
    description: Azure OpenAI API version.
    required: false
  loopa-api-url:
    description: Advanced Loopa API base URL override.
    required: false
    default: https://api.getloopa.com
outputs:
  report-id:
    description: Identifier assigned by Loopa to the accepted report.
  proposal-count:
    description: Number of proposals delivered.
  status:
    description: Delivery status.
runs:
  using: node24
  main: dist/index.js
